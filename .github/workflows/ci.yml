# .github/workflows/ci.yml
# Source: docs.github.com/en/actions/quickstart
#         github.com/actions/setup-node
# CI gate for pull requests — lint + format:check + astro check + test.
# Main-branch validation moved to deploy.yml (which runs the same gate before
# publishing), so this only runs on PRs to avoid double-running on main pushes.
# No `permissions:` block — default GITHUB_TOKEN is read-only, which is all CI needs.

name: CI

on:
    pull_request:
        branches: [main]

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            # Generate content-collection types so typed-ESLint can resolve
            # astro:content calls (.astro/types.d.ts) in a clean checkout.
            - run: npx astro sync
            - run: npm run lint
            - run: npm run format:check
            - run: npx astro check
            - run: npm test
