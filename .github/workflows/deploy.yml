# .github/workflows/deploy.yml
# Builds the Astro site and publishes it to GitHub Pages via the Actions
# Pages source (build_type: workflow) — no more gh-pages branch.
#
# Hard gate: the build job runs the full CI suite (lint + format:check +
# astro check + test) BEFORE building, so a red main never ships.
# ci.yml stays as the pull-request gate; this file owns main → live.

name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch: # manual "Run workflow" button

# Least-privilege token: read the repo, write a Pages deployment, mint the
# OIDC id-token deploy-pages needs.
permissions:
    contents: read
    pages: write
    id-token: write

# One deploy at a time. Don't cancel an in-flight publish (cancel-in-progress:
# false) so a half-uploaded artifact never goes live.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            # Generate content-collection types so typed-ESLint can resolve
            # astro:content calls (.astro/types.d.ts). Without this, lint fails
            # in a clean checkout with "type that could not be resolved".
            - run: npx astro sync
            - run: npm run lint
            - run: npm run format:check
            - run: npx astro check
            - run: npm test
            - run: npm run build
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: ./dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
